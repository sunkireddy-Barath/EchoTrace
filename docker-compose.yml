version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: echotrace-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - echotrace

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echotrace-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - echotrace

networks:
  echotrace:
    driver: bridge
